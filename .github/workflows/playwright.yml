name: Playwright

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - stable*

concurrency:
  group: playwright-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  APP_NAME: tables

jobs:
  playwright:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        server-versions: ['stable33', 'master']

    name: Playwright (${{ matrix.server-versions }})

    steps:
      - name: Checkout app
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          cache: 'npm'
          node-version-file: 'package.json'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: TESTING=true npm run build --if-present

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          SERVER_BRANCH: ${{ matrix.server-versions }}

      - name: Upload test results
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always()
        with:
          name: playwright-results-${{ matrix.server-versions }}
          path: |
            playwright/test-results/
            test-results/
          retention-days: 5

  summary:
    permissions:
      contents: none
    runs-on: ubuntu-latest-low
    needs: playwright

    if: always()

    name: playwright-summary

    steps:
      - name: Summary status
        run: if ${{ needs.playwright.result != 'success' && needs.playwright.result != 'skipped' }}; then exit 1; fi
