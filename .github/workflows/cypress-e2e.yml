#
# Cypress end-to-end tests that temporarily supplement Playwright (CI-flaky scenarios).
# Default Playwright coverage remains in playwright.yml.

name: Cypress E2E (supplement)

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - stable*

concurrency:
  group: cypress-e2e-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  APP_NAME: tables
  CYPRESS_baseUrl: http://127.0.0.1:8089/index.php/

jobs:
  cypress-e2e:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        server-versions: ['stable33', 'master']

    name: Cypress E2E supplement (${{ matrix.server-versions }})

    steps:
      - name: Checkout app
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          cache: 'npm'
          node-version-file: 'package.json'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: TESTING=true npm run build --if-present

      - name: Cypress run (supplement specs)
        uses: cypress-io/github-action@8a35f965fbd13e3b18d9fb3bdc5f50ae2f4a5e76 # v7.1.0
        with:
          install: false
          start: node playwright/start-nextcloud-server.mjs
          wait-on: 'http://127.0.0.1:8089'
          wait-on-timeout: 600000
          command: npm run test:e2e:cypress
          config: defaultCommandTimeout=20000,video=false
        env:
          SERVER_BRANCH: ${{ matrix.server-versions }}
          COMMIT_INFO_MESSAGE: ${{ github.event.pull_request.title }}
          COMMIT_INFO_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Upload test failure screenshots
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: failure()
        with:
          name: cypress-e2e-screenshots-${{ matrix.server-versions }}
          path: cypress/screenshots/
          retention-days: 5

  summary:
    permissions:
      contents: none
    runs-on: ubuntu-latest-low
    needs: cypress-e2e

    if: always()

    name: cypress-e2e-summary

    steps:
      - name: Summary status
        run: if ${{ needs.cypress-e2e.result != 'success' && needs.cypress-e2e.result != 'skipped' }}; then exit 1; fi
